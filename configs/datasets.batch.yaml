discovery:
  datasets_root: ../datasets
  dataset_glob: "*"

output:
  staged_root: ../data/staged
  processed_root: ../data/processed
  results_root: ../results

methodology:
  flow_key_fields:
    - src_ip
    - dst_ip
    - src_port
    - dst_port
    - protocol
  inactivity_timeout_seconds: 15
  size_basis: packets
  byte_basis: captured_len

sampling:
  rates:
    - 10
    - 100
    - 1000
  method: systematic

runtime:
  workers: 1
  enable_plots: true
