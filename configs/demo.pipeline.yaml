dataset:
  dataset_id: demo_trace
  input_dir: ../data/raw/demo_trace
  raw_glob: "demo_trace.pcap"

output:
  staged_dir: ../data/staged
  processed_dir: ../data/processed
  results_tables_dir: ../results/tables
  results_plots_dir: ../results/plots

methodology:
  flow_key_fields:
    - src_ip
    - dst_ip
    - src_port
    - dst_port
    - protocol
  inactivity_timeout_seconds: 15
  size_basis: packets
  byte_basis: captured_len

sampling:
  rates:
    - 2
    - 3
  method: systematic

runtime:
  workers: 1
  enable_plots: true
